services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rds-2p-salute-app
    ports:
      - "20000:8000"
      - "50051:50051"
    volumes:
      # Монтируем код приложения для автоматического применения изменений
      - ./app:/app/app
      # grpc_proto оставляем в образе (proto файлы редко меняются, а сгенерированные файлы нужны при запуске)
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - CVC_SERVICE_URL=http://cvc-api:20001
    restart: unless-stopped
    networks:
      - robot-services-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  robot-services-network:
    external: true
